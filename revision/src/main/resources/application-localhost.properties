eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

spring.kafka.bootstrap-servers=localhost:9092


spring.datasource.url=jdbc:mysql://localhost:3306/msrevision?createDatabaseIfNotExists=true&useSSL=false&allowPublicKeyRetrieval=true
spring.jpa.properties.hibernate.default_schema=msrevision
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Anand11@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


management.tracing.enabled=false
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.endpoints.web.exposure.include=*
management.observations.http.server.requests.enabled=true
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%5p] [${spring.application.name}, traceId=%X{trace_id}, spanId=%X{span_id}] [%t] %c{1} - %msg%n
logging.pattern.level=%5p [${spring.application.name}, traceId=%X{trace_id}, spanId=%X{span_id}]


# Log levels
logging.level.root=INFO
logging.level.com.practise.revision=DEBUG
logging.level.org.springframework.kafka=DEBUG


# File logging
logging.file.name=logs/revision.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.file.total-size-cap=100MB


# circuit breaker for getbyuserId api
#these are config templates

resilience4j.circuitBreaker.configs.databaseCB.slidingWindowSize=10
resilience4j.circuitbreaker.configs.databaseCB.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.databaseCB.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.configs.apiCB.sliding-window-size=5
resilience4j.circuitbreaker.configs.apiCB.failure-rate-threshold=30
resilience4j.circuitbreaker.configs.apiCB.wait-duration-in-open-state=30s

# ===== PART 2: Use the configs =====
resilience4j.circuitbreaker.instances.getUserCB.base-config=databaseCB
resilience4j.circuitbreaker.instances.updateUserCB.base-config=databaseCB
resilience4j.circuitbreaker.instances.getUserOrdersCB.base-config=apiCB
