eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

spring.kafka.bootstrap-servers=kafka:9092


spring.datasource.url=jdbc:mysql://mysql-db:3306/msrevision?createDatabaseIfNotExists=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.endpoints.web.exposure.include=*
management.observations.http.server.requests.enabled=true
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%5p] [${spring.application.name}, traceId=%X{trace_id}, spanId=%X{span_id}] [%t] %c{1} - %msg%n
logging.pattern.level=%5p [${spring.application.name}, traceId=%X{trace_id}, spanId=%X{span_id}]
