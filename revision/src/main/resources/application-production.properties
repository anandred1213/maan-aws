spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/msrevision}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9093}

# Production settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://yourdomain.com}

# JWT - Access Token (15 minutes)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}

# JWT - Refresh Token (7 days)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Logging
logging.level.root=WARN
logging.level.com.practise=INFO
logging.file.name=/var/log/user-microservice.log
