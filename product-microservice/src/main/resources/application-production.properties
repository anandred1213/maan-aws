spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/product_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Production settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://yourdomain.com}

# Logging
logging.level.root=WARN
logging.level.com.product_service=INFO
logging.file.name=/var/log/product-microservice.log
